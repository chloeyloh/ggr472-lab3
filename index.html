<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Day at the Beach BIA</title>
    <!--Mapbox links-->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css' rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id='my-map' class="map-container"></div>

    <!--Creating my legend-->
    <div id="legend" class="legend">
        <h3>Gems at the Beach BIA</h3>
    </div>

    <!--Loading mapbox-gl-geocoder plugin-->
    <script
        src='https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js'></script>
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css"
        type="text/css">

    <script src="script.js"></script> <!--Main script for my map-->
    <script src="script-legend.js"></script> <!--Script for my legend-->
</body>

</html>
